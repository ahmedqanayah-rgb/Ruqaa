name: Deploy to GitHub Pages

# Builds the Vite site and publishes dist/ to GitHub Pages on every push to
# main. The site is served at https://ahmedqanayah-rgb.github.io/Ruqaa/ — which
# works because vite.config.js sets base:'./' (relative asset paths) and the app
# uses HashRouter, so there is no server-side routing to configure.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # enablement:true turns Pages on the first time this runs, so no manual
      # repo-settings step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
