<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Opt out of mobile browsers' forced dark mode; the app has its own theme
         toggle (AppContext swaps this to the CSS color-scheme per theme). -->
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#f7f4ee" />
    <title>رُقعة — نادي القراءة | Ruqʿa — Reading Club</title>
    <meta name="description" content="نادي «رُقعة» للقراءة — ملخّصاتٌ تفاعلية ثنائية اللغة للكتب التي نقرؤها، من صنع الأعضاء وغير مرتبطة بالمؤلّفين أو دور النشر." />

    <!-- Link previews, for when a member drops the site into the club group.
         NOTE: og:image is relative because the site has no public URL yet.
         WhatsApp/Facebook scrapers want an ABSOLUTE url — once this is deployed,
         change the two image tags to e.g.
         https://<your-domain>/images/club/reading-corner.jpg -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="رُقعة — Ruqʿa" />
    <meta property="og:title" content="رُقعة — نادي القراءة | Ruqʿa — Reading Club" />
    <meta property="og:description" content="نادي قراءةٍ نلتقي فيه أسبوعياً من ستّ دول — ملخّصاتٌ تفاعلية ثنائية اللغة، ودراساتٌ على هيئة لعبة، وتقييماتٌ تجرّبها بنفسك." />
    <meta property="og:image" content="./images/club/reading-corner.jpg" />
    <meta property="og:image:alt" content="كوبُ شايٍ وكتابٌ مفتوح ونظّارةٌ على غطاءٍ صوفيّ" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="رُقعة — نادي القراءة | Ruqʿa — Reading Club" />
    <meta name="twitter:description" content="نادي قراءةٍ نلتقي فيه أسبوعياً من ستّ دول — ملخّصاتٌ تفاعلية ثنائية اللغة." />
    <meta name="twitter:image" content="./images/club/reading-corner.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
